version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./ml/artifacts:/app/ml/artifacts
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GLYCO_LLM_PROVIDER=${GLYCO_LLM_PROVIDER:-groq}
      - GLYCO_DEEPSEEK_MODEL=${GLYCO_DEEPSEEK_MODEL:-liquid/lfm-2.5-1.2b-instruct:free}
      - GLYCO_DEEPSEEK_URL=${GLYCO_DEEPSEEK_URL:-https://openrouter.ai/api/v1}
      - GLYCO_OLLAMA_URL=${GLYCO_OLLAMA_URL:-http://host.docker.internal:11434}
      - GLYCO_OLLAMA_MODEL=${GLYCO_OLLAMA_MODEL:-llama3.2:1b}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GLYCO_GEMINI_MODEL=${GLYCO_GEMINI_MODEL:-gemini-2.5-flash}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GLYCO_GROQ_MODEL=${GLYCO_GROQ_MODEL:-llama-3.3-70b-versatile}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
